handle_user_request_task:
  description: >
    Mensaje actual del usuario: '{user_input}'
    Historial de la conversación: {chat_history}
    
    INSTRUCCIONES PASO A PASO:
    1. ANALIZA el 'Mensaje actual' y el 'Historial' para entender el contexto.
    2. CLASIFICA la intención:
       - Si es charla general (saludos, despedidas, agradecimientos): Responde directamente basándote en tu personalidad de administrador.
       - Si el usuario pide datos (buscar un perfil, ver usuarios nuevos, estadísticas): DEBES delegar la tarea de búsqueda a tu compañero 'User Data Specialist'.
    3. SÍNTESIS (Si delegaste): Una vez que el 'User Data Specialist' te devuelva los datos, léelos y redacta una respuesta clara y amigable para el usuario. Si el especialista dice que no hay datos, infórmale eso al usuario sin inventar nada.
  expected_output: >
    La respuesta final directa para el usuario. 
    REGLA ESTRICTA: Debe ser un mensaje de texto plano, natural, en español. 
    PROHIBIDO usar formato JSON, diccionarios de Python, o etiquetas como <respuesta>. Escribe como en un chat.
  agent: adventure_streak_orchestrator

manage_user_queries_task:
  description: >
    Has recibido una solicitud del Orchestrator para buscar datos en Firestore.
    
    INSTRUCCIONES:
    1. Identifica qué parámetros necesitas usar en tu 'UserSearchTool' (por ejemplo: un término de búsqueda 'search_query' o si necesitas listar usuarios nuevos 'list_new_users=True').
    2. Ejecuta la herramienta con los parámetros exactos.
    3. Analiza el resultado crudo devuelto por la herramienta.
  expected_output: >
    Un reporte técnico estructurado (pueden ser viñetas) con los datos encontrados.
    REGLA DE ERROR: Si la herramienta devuelve un error, una lista vacía o no encuentra coincidencias, tu output EXACTO debe ser: "Búsqueda completada: No se encontraron usuarios en Firestore con esos parámetros." NO inventes datos para rellenar.
  agent: user_data_specialist